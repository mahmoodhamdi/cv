<style>
.err-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:40px 24px;position:relative;z-index:1}
.err-code{font-size:120px;font-weight:700;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;margin-bottom:16px;font-family:var(--fn-d)}
.err-title{font-size:24px;font-weight:600;margin-bottom:8px;color:var(--txt)}
.err-desc{font-size:15px;color:var(--txt2);margin-bottom:32px;max-width:400px;margin-left:auto;margin-right:auto}
.err-links{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.err-link{padding:12px 28px;border-radius:10px;font-family:var(--fn);font-size:14px;font-weight:600;text-decoration:none;transition:all .3s}
.err-link-p{background:var(--grad);color:#fff}
.err-link-p:hover{box-shadow:0 4px 20px var(--accent-g)}
.err-link-o{border:2px solid var(--accent);color:var(--accent)}
.err-link-o:hover{background:var(--accent-g)}
html[dir="rtl"] .err-code{font-family:var(--fn-ar)}
html[dir="rtl"] .err-title,html[dir="rtl"] .err-desc{font-family:var(--fn-ar-b)}
html[dir="rtl"] .err-link{font-family:var(--fn-ar-b)}
.lang-sw{position:fixed;top:20px;right:20px;z-index:100;display:flex;gap:8px}
.lang-sw button{padding:7px 16px;border:1px solid var(--bdr);border-radius:8px;background:var(--card);color:var(--muted);cursor:pointer;font-family:var(--fn);font-size:12px;font-weight:500;transition:all .3s}
.lang-sw button.on{background:var(--grad);color:#fff;border-color:transparent}
</style>
</head>
<body class="loaded">
<div class="orb orb-1" aria-hidden="true"></div>
<div class="orb orb-2" aria-hidden="true"></div>
<div class="lang-sw">
  <button class="on" onclick="setL('en')">EN</button>
  <button onclick="setL('ar')">عربي</button>
</div>
<div class="err-wrap">
  <div>

      <a class="err-link err-link-o" href="./blog/">Visit Blog</a>
    </div>
    <div class="err-links" id="l-ar" style="display:none">

      <a class="err-link err-link-o" href="./blog/">زيارة المدونة</a>
    </div>
    <div class="err-popular" id="p-en" style="margin-top:40px;font-size:13px;color:var(--muted)">
      Popular pages: <a href="./about.html" style="color:var(--accent);text-decoration:none;margin:0 6px">About</a>·<a href="./services.html" style="color:var(--accent);text-decoration:none;margin:0 6px">Services</a>·<a href="./blog/" style="color:var(--accent);text-decoration:none;margin:0 6px">Blog</a>·<a href="https://github.com/mahmoodhamdi" target="_blank" rel="noopener" style="color:var(--accent);text-decoration:none;margin:0 6px">GitHub</a>

    <div class="err-popular" id="p-ar" style="display:none;margin-top:40px;font-size:13px;color:var(--muted)">
      الصفحات الأكثر زيارة: <a href="./about.html" style="color:var(--accent);text-decoration:none;margin:0 6px">عني</a>·<a href="./services.html" style="color:var(--accent);text-decoration:none;margin:0 6px">الخدمات</a>·<a href="./blog/" style="color:var(--accent);text-decoration:none;margin:0 6px">المدونة</a>·<a href="https://github.com/mahmoodhamdi" target="_blank" rel="noopener" style="color:var(--accent);text-decoration:none;margin:0 6px">GitHub</a>
    </div>
  </div>
</div>
<script>
function setL(l){
  var h=document.documentElement,b=document.querySelectorAll('.lang-sw button');
  function show(id, on){var el=document.getElementById(id); if(el) el.style.display = on ? (id.startsWith('l-')?'flex':'') : 'none';}
  if(l==='ar'){h.dir='rtl';h.lang='ar';b[0].classList.remove('on');b[1].classList.add('on');
    show('t-en',0);show('t-ar',1);show('d-en',0);show('d-ar',1);show('l-en',0);show('l-ar',1);show('p-en',0);show('p-ar',1);
  }else{h.dir='ltr';h.lang='en';b[0].classList.add('on');b[1].classList.remove('on');
    show('t-en',1);show('t-ar',0);show('d-en',1);show('d-ar',0);show('l-en',1);show('l-ar',0);show('p-en',1);show('p-ar',0);
  }
}
try{var t=localStorage.getItem('cv-theme');if(t)document.documentElement.setAttribute('data-theme',t)}catch(e){}
</script>
